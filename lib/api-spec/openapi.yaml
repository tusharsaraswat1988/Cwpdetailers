          type: string
          format: date-time
      required: [id, name, city]

    CreateBranchBody:
      type: object
      properties:
        name:
          type: string
        city:
          type: string
        address:
          type: string
        phone:
          type: string
        managerName:
          type: string
      required: [name, city]

    # ANALYTICS
    DashboardStats:
      type: object
      properties:
        todayRevenue:
          type: number
        monthRevenue:
          type: number
        totalRevenue:
          type: number
        activeSubscriptions:
          type: integer
        totalCustomers:
          type: integer
        newCustomersThisMonth:
          type: integer
        pendingDuesTotal:
          type: number
        activeJobs:
          type: integer
        completedJobsToday:
          type: integer
        totalStaff:
          type: integer
        openComplaints:
          type: integer
        repeatCustomerPercent:
          type: number
