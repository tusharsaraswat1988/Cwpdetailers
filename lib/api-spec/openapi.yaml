                type: string
              revenue:
                type: number
              bookings:
                type: integer
        revenueByBranch:
          type: array
          items:
            type: object
            properties:
              branchName:
                type: string
              revenue:
                type: number
      required: [totalRevenue, paidRevenue, pendingRevenue]

