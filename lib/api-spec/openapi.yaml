    # NOTIFICATIONS
    Notification:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [booking_confirmation, payment_reminder, subscription_expiry, service_complete, complaint_update, broadcast]
        channel:
          type: string
          enum: [in_app, whatsapp, email, sms]
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, title, message, type, isRead]

    CreateNotificationBody:
      type: object
      properties:
        userId:
          type: integer
        title:
          type: string
        message:
