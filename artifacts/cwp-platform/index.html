<!DOCTYPE html>
<html lang="en" class="cwp-splash-active">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#00cccc" />
    <meta name="description" content="Premium car wash, detailing, and solar cleaning services across India." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CWP Detailers" />
    <title>Loading…</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
    <link rel="manifest" href="/api/branding/public/manifest/main" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      #cwp-app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        transition: opacity 0.28s ease, visibility 0.28s ease;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      #cwp-app-splash.cwp-app-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .cwp-splash-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25rem;
      }
      #cwp-splash-logo {
        width: 7.5rem;
        height: 7.5rem;
        object-fit: contain;
      }
      .cwp-splash-accent {
        width: 2rem;
        height: 0.2rem;
        border-radius: 9999px;
        background-color: #00cccc;
        animation: cwp-splash-pulse 1.1s ease-in-out infinite;
      }
      @keyframes cwp-splash-pulse {
        0%, 100% { opacity: 0.35; transform: scaleX(0.85); }
        50% { opacity: 1; transform: scaleX(1); }
      }
      html.cwp-splash-active body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="cwp-app-splash" role="status" aria-live="polite" aria-label="Loading application">
      <div class="cwp-splash-inner">
        <img
          id="cwp-splash-logo"
          src="/pwa/icon-512.png"
          alt="CWP Detailers"
          width="120"
          height="120"
          decoding="async"
        />
        <div class="cwp-splash-accent" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var splash = document.getElementById("cwp-app-splash");
        fetch("/api/branding/public", { credentials: "same-origin" })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (b) {
            if (!b || !splash) return;
            splash.style.backgroundColor = b.backgroundColor || "#ffffff";
            var ga = b.generatedAssets || {};
            var logo =
              b.loginLogo ||
              b.fullLogo ||
              b.pwaIcon ||
              ga.pwaIcon512 ||
              ga.androidChrome512;
            var img = document.getElementById("cwp-splash-logo");
            if (img && logo) {
              img.src = logo;
              img.alt = b.brandName || "CWP Detailers";
            }
            var accent = splash.querySelector(".cwp-splash-accent");
            if (accent && b.primaryColor) accent.style.backgroundColor = b.primaryColor;
            var themeMeta = document.querySelector("meta[name='theme-color']");
            if (themeMeta && b.primaryColor) themeMeta.setAttribute("content", b.primaryColor);
            if (b.brandName) {
              var appleTitle = document.querySelector("meta[name='apple-mobile-web-app-title']");
              if (appleTitle) appleTitle.setAttribute("content", b.brandName);
            }
            var apple = b.appleTouchIcon || ga.appleTouchIcon;
            if (apple) {
              var appleLink = document.querySelector("link[rel='apple-touch-icon']");
              if (appleLink) appleLink.setAttribute("href", apple);
            }
          })
          .catch(function () {});
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
