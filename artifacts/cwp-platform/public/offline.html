<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Offline</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #cccccc;
        --bg: #f5f6f8;
        --text: #1a2332;
        --muted: #64748b;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-top: calc(1.5rem + env(safe-area-inset-top, 0px));
        padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      }
      .card {
        max-width: 24rem;
        text-align: center;
      }
      .logo {
        width: 4rem;
        height: 4rem;
        object-fit: contain;
        margin: 0 auto 1.25rem;
        display: none;
      }
      .logo[src]:not([src=""]) { display: block; }
      h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
      p { color: var(--muted); font-size: 0.875rem; line-height: 1.5; margin-bottom: 1.5rem; }
      button {
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <img id="offline-logo" class="logo" src="" alt="" />
      <h1 id="offline-title">You're offline</h1>
      <p id="offline-desc">Check your internet connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
    <script>
      fetch("/api/branding").then(function(r){return r.ok?r.json():null}).then(function(b){
        if(!b)return;
        if(b.primaryColor)document.documentElement.style.setProperty("--primary",b.primaryColor);
        if(b.backgroundColor)document.documentElement.style.setProperty("--bg",b.backgroundColor);
        if(b.brandName){
          document.getElementById("offline-title").textContent="You're offline";
          document.title="Offline — "+b.brandName;
        }
        var logo=b.logoIcon||b.fullLogo||(b.generatedAssets&&b.generatedAssets.pwaIcon192);
        if(logo){var img=document.getElementById("offline-logo");img.src=logo;img.alt=b.brandName||"";}
        var fav=b.favicon||(b.generatedAssets&&b.generatedAssets.favicon32);
        if(fav){var l=document.createElement("link");l.rel="icon";l.href=fav;document.head.appendChild(l);}
      }).catch(function(){});
    </script>
  </body>
</html>
