<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Pricing Quote API</title>
<style>body{font-family:Segoe UI,sans-serif;background:#0f172a;color:#e2e8f0;padding:24px}pre{background:#1e293b;padding:16px;border-radius:8px;overflow:auto}h1{color:#22d3ee}</style></head>
<body>
<h1>Pricing Quote API</h1>
<p>Route: <code>GET /api/pricing/quote?serviceId=2&amp;citySlug=varanasi&amp;vehicleModelId=1</code></p>
<pre id="out">Loading…</pre>
<script>
fetch('http://localhost:8080/api/pricing/quote?serviceId=2&citySlug=varanasi&vehicleModelId=1')
  .then(r=>r.json()).then(d=>{document.getElementById('out').textContent=JSON.stringify(d,null,2);});
</script>
</body></html>
