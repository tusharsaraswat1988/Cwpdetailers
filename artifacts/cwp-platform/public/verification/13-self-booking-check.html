<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Self Booking Check</title>
<style>body{font-family:Segoe UI,sans-serif;background:#0f172a;color:#e2e8f0;padding:24px}pre{background:#1e293b;padding:16px;border-radius:8px;overflow:auto}h1{color:#22d3ee}</style></head>
<body>
<h1>Self Booking Eligibility</h1>
<p>Route: <code>GET /api/catalog/self-booking/check?customerId=1&amp;serviceId=2&amp;citySlug=varanasi</code></p>
<pre id="out">Loading…</pre>
<script>
fetch('http://localhost:8080/api/catalog/self-booking/check?customerId=1&serviceId=2&citySlug=varanasi')
  .then(r=>r.json()).then(d=>{document.getElementById('out').textContent=JSON.stringify(d,null,2);});
</script>
</body></html>
